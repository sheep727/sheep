<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题本 - 拍照整理打印</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; border-radius: 16px; margin-bottom: 30px; }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header p { opacity: 0.9; font-size: 14px; }
        .main-content { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 800px) { .main-content { grid-template-columns: 1fr; } }
        .editor-panel { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .upload-area { border: 2px dashed #dde1e7; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-area.dragover { border-color: #667eea; background: #f0f2ff; }
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-text { color: #666; font-size: 14px; }
        .upload-hint { color: #999; font-size: 12px; margin-top: 8px; }
        #fileInput { display: none; }
        .image-container { position: relative; display: none; margin-bottom: 20px; border-radius: 12px; overflow: hidden; background: #f0f0f0; }
        .image-container.active { display: block; }
        #sourceImage { max-width: 100%; display: block; }
        #selectionCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        .tool-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a71d4; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #e63946; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .question-list { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex: 1; max-height: 500px; display: flex; flex-direction: column; }
        .question-list h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
        .question-count { background: #667eea; color: white; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
        .questions { flex: 1; overflow-y: auto; margin-bottom: 12px; }
        .question-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f8f9ff; border-radius: 8px; margin-bottom: 8px; }
        .question-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .question-item .info { flex: 1; }
        .question-item .number { font-size: 12px; color: #666; }
        .question-item .delete-btn { width: 28px; height: 28px; border: none; background: #ff4757; color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .question-item .delete-btn:hover { background: #e63946; }
        .empty-state { text-align: center; padding: 30px 10px; color: #999; }
        .empty-icon { font-size: 40px; margin-bottom: 10px; }
        .actions { display: flex; flex-direction: column; gap: 10px; }
        .instructions { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .instructions h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
        .instructions ol { font-size: 13px; color: #666; padding-left: 20px; }
        .instructions li { margin-bottom: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 30px; max-width: 400px; text-align: center; }
        .modal-content h3 { margin-bottom: 10px; color: #333; }
        .modal-content p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 2000; display: none; align-items: center; justify-content: center; pointer-events: none; }
        .flash.active { display: flex; animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
        .preview-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .preview-modal.active { display: flex; }
        .preview-modal h3 { color: white; margin-bottom: 20px; }
        .preview-modal img { max-width: 90%; max-height: 70vh; border-radius: 8px; }
        .preview-actions { display: flex; gap: 10px; margin-top: 20px; }
        .preview-actions .btn { padding: 12px 30px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>错题本</h1>
            <p>拍照上传 - 框选错题 - 生成PDF - 打印练习</p>
        </header>
        <div class="main-content">
            <div class="editor-panel">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon"></div>
                    <div class="upload-text">点击上传图片 或 拖拽到此处</div>
                    <div class="upload-hint">支持 JPG、PNG 格式</div>
                </div>
                <input type="file" id="fileInput" accept="image/*">
                <div class="image-container" id="imageContainer">
                    <img id="sourceImage" crossorigin="anonymous">
                    <canvas id="selectionCanvas"></canvas>
                </div>
                <div class="tool-bar">
                    <button class="btn btn-primary" id="addQuestionBtn" disabled>添加选中区域</button>
                    <button class="btn btn-secondary" id="clearSelectionBtn" disabled>清除选择</button>
                    <button class="btn btn-secondary" id="changeImageBtn" style="display:none;">更换图片</button>
                </div>
            </div>
            <div class="sidebar">
                <div class="question-list">
                    <h3>已选错题 <span class="question-count" id="questionCount">0</span></h3>
                    <div class="questions" id="questionsContainer">
                        <div class="empty-state">
                            <div class="empty-icon"></div>
                            <div>还没有添加错题</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" id="generatePdfBtn" disabled>生成 PDF</button>
                        <button class="btn btn-danger" id="clearAllBtn" disabled>清空全部</button>
                    </div>
                </div>
                <div class="instructions">
                    <h3>使用说明</h3>
                    <ol>
                        <li>上传拍好的试卷或作业照片</li>
                        <li>在图片上拖动框选错题区域</li>
                        <li>点击"添加选中区域"</li>
                        <li>重复以上步骤添加多道错题</li>
                        <li>点击"生成 PDF"下载打印</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>
    <div class="modal" id="loadingModal">
        <div class="modal-content">
            <div class="spinner"></div>
            <h3>正在生成 PDF...</h3>
            <p>请稍候</p>
        </div>
    </div>
    <div class="flash" id="flashEffect"></div>
    <div class="preview-modal" id="previewModal">
        <h3>错题预览</h3>
        <img id="previewImage" src="" alt="">
        <div class="preview-actions">
            <button class="btn btn-primary" id="confirmAddBtn">确认添加</button>
            <button class="btn btn-secondary" id="cancelAddBtn">取消</button>
        </div>
    </div>
    <script>
        const state = { questions: [], isDrawing: false, startX: 0, startY: 0, imageLoaded: false, selectionRect: null, pendingCrop: null };
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const imageContainer = document.getElementById("imageContainer");
        const sourceImage = document.getElementById("sourceImage");
        const selectionCanvas = document.getElementById("selectionCanvas");
        const ctx = selectionCanvas.getContext("2d");
        const addQuestionBtn = document.getElementById("addQuestionBtn");
        const clearSelectionBtn = document.getElementById("clearSelectionBtn");
        const changeImageBtn = document.getElementById("changeImageBtn");
        const questionsContainer = document.getElementById("questionsContainer");
        const questionCount = document.getElementById("questionCount");
        const generatePdfBtn = document.getElementById("generatePdfBtn");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const loadingModal = document.getElementById("loadingModal");
        const flashEffect = document.getElementById("flashEffect");
        const previewModal = document.getElementById("previewModal");
        const previewImage = document.getElementById("previewImage");
        const confirmAddBtn = document.getElementById("confirmAddBtn");
        const cancelAddBtn = document.getElementById("cancelAddBtn");
        uploadArea.addEventListener("click", () => fileInput.click());
        uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("dragover"); });
        uploadArea.addEventListener("dragleave", () => { uploadArea.classList.remove("dragover"); });
        uploadArea.addEventListener("drop", (e) => { e.preventDefault(); uploadArea.classList.remove("dragover"); const file = e.dataTransfer.files[0]; if (file && file.type.startsWith("image/")) loadImage(file); });
        fileInput.addEventListener("change", (e) => { const file = e.target.files[0]; if (file) loadImage(file); });
        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                sourceImage.onload = () => {
                    setupCanvas();
                    uploadArea.style.display = "none";
                    imageContainer.classList.add("active");
                    changeImageBtn.style.display = "inline-flex";
                    addQuestionBtn.disabled = true;
                    clearSelectionBtn.disabled = true;
                };
                sourceImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function setupCanvas() {
            const rect = sourceImage.getBoundingClientRect();
            selectionCanvas.width = sourceImage.naturalWidth;
            selectionCanvas.height = sourceImage.naturalHeight;
            selectionCanvas.style.width = rect.width + "px";
            selectionCanvas.style.height = rect.height + "px";
            selectionCanvas.style.left = "0px";
            selectionCanvas.style.top = "0px";
            state.imageLoaded = true;
            ctx.drawImage(sourceImage, 0, 0);
        }
        changeImageBtn.addEventListener("click", () => { fileInput.click(); });
        function getCanvasCoords(e) {
            const rect = selectionCanvas.getBoundingClientRect();
            const scaleX = selectionCanvas.width / rect.width;
            const scaleY = selectionCanvas.height / rect.height;
            if (e.touches) return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }
        selectionCanvas.addEventListener("mousedown", startSelection);
        selectionCanvas.addEventListener("touchstart", startSelection);
        function startSelection(e) {
            if (!state.imageLoaded) return;
            e.preventDefault();
            state.isDrawing = true;
            const coords = getCanvasCoords(e);
            state.startX = coords.x;
            state.startY = coords.y;
        }
        selectionCanvas.addEventListener("mousemove", updateSelection);
        selectionCanvas.addEventListener("touchmove", updateSelection);
        function updateSelection(e) {
            if (!state.isDrawing) return;
            e.preventDefault();
            const coords = getCanvasCoords(e);
            const endX = coords.x;
            const endY = coords.y;
            ctx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
            ctx.drawImage(sourceImage, 0, 0);
            const x = Math.min(state.startX, endX);
            const y = Math.min(state.startY, endY);
            const width = Math.abs(endX - state.startX);
            const height = Math.abs(endY - state.startY);
            ctx.fillStyle = "rgba(102, 126, 234, 0.2)";
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = "#667eea";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(x, y, width, height);
            ctx.setLineDash([]);
            state.selectionRect = { x, y, width, height };
            addQuestionBtn.disabled = !(width > 10 && height > 10);
            clearSelectionBtn.disabled = false;
        }
        selectionCanvas.addEventListener("mouseup", endSelection);
        selectionCanvas.addEventListener("touchend", endSelection);
        selectionCanvas.addEventListener("mouseleave", endSelection);
        function endSelection() {
            if (!state.isDrawing) return;
            state.isDrawing = false;
            if (state.selectionRect && state.selectionRect.width > 10 && state.selectionRect.height > 10) {
                const cropCanvas = document.createElement("canvas");
                const cropCtx = cropCanvas.getContext("2d");
                const { x, y, width, height } = state.selectionRect;
                cropCanvas.width = width;
                cropCanvas.height = height;
                cropCtx.drawImage(sourceImage, x, y, width, height, 0,0, width, height);
                state.pendingCrop = cropCanvas.toDataURL("image/png");
                previewImage.src = state.pendingCrop;
                previewModal.classList.add("active");
            }
        }
        function clearSelection() {
            state.selectionRect = null;
            ctx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
            ctx.drawImage(sourceImage, 0, 0);
            addQuestionBtn.disabled = true;
            clearSelectionBtn.disabled = true;
        }
        clearSelectionBtn.addEventListener("click", clearSelection);
        confirmAddBtn.addEventListener("click", () => {
            if (!state.pendingCrop) return;
            state.questions.push(state.pendingCrop);
            state.pendingCrop = null;
            previewModal.classList.remove("active");
            clearSelection();
            renderQuestions();
        });
        cancelAddBtn.addEventListener("click", () => {
            state.pendingCrop = null;
            previewModal.classList.remove("active");
            clearSelection();
        });
        addQuestionBtn.addEventListener("click", () => {
            if (!state.selectionRect) return;
            const cropCanvas = document.createElement("canvas");
            const cropCtx = cropCanvas.getContext("2d");
            const { x, y, width, height } = state.selectionRect;
            cropCanvas.width = width;
            cropCanvas.height = height;
            cropCtx.drawImage(sourceImage, x, y, width, height, 0, 0, width, height);
            state.questions.push(cropCanvas.toDataURL("image/png"));
            clearSelection();
            renderQuestions();
        });
        function renderQuestions() {
            questionCount.textContent = state.questions.length;
            generatePdfBtn.disabled = state.questions.length === 0;
            clearAllBtn.disabled = state.questions.length === 0;
            if (state.questions.length === 0) {
                questionsContainer.innerHTML = <div class="empty-state"><div class="empty-icon"></div><div>还没有添加错题</div></div>;
                return;
            }
            questionsContainer.innerHTML = state.questions.map((q, i) => <div class="question-item"><img src="" alt=""><div class="info"><div class="number">第  题</div></div><button class="delete-btn" data-index="">×</button></div>).join('');
            questionsContainer.querySelectorAll(".delete-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = parseInt(btn.dataset.index);
                    state.questions.splice(idx, 1);
                    renderQuestions();
                });
            });
        }
        clearAllBtn.addEventListener("click", () => {
            if (!confirm("确定要清空所有错题吗？")) return;
            state.questions = [];
            renderQuestions();
        });
        generatePdfBtn.addEventListener("click", async () => {
            if (state.questions.length === 0) return;
            loadingModal.classList.add("active");
            await new Promise(r => setTimeout(r, 100));
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF("p", "mm", "a4");
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const margin = 10;
                for (let i = 0; i < state.questions.length; i++) {
                    const img = new Image();
                    img.src = state.questions[i];
                    await new Promise(resolve => { img.onload = resolve; });
                    const imgWidth = img.naturalWidth;
                    const imgHeight = img.naturalHeight;
                    const ratio = Math.min((pageWidth - margin * 2) / imgWidth, (pageHeight - margin * 2) / imgHeight);
                    const w = imgWidth * ratio;
                    const h = imgHeight * ratio;
                    if (i > 0) pdf.addPage();
                    pdf.addImage(state.questions[i], "PNG", margin, margin, w, h);
                }
                pdf.save("错题本.pdf");
            } catch (err) {
                alert("生成失败：" + err.message);
            }
            loadingModal.classList.remove("active");
        });
    </script>
</body>
</html>
